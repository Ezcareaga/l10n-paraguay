# checklog-odoo config — ignore known-noise log patterns in CI.
# Consumed by `checklog-odoo` (invoked from oca_checklog_odoo step in
# .github/workflows/test.yml when OCA_ENABLE_CHECKLOG_ODOO=1).
#
# Each pattern below is a Python regex matched against Odoo log lines.
# Only ADD a pattern when there is a documented BUGS_BACKLOG TD entry
# explaining what produces it and how it will eventually be eliminated.

[checklog-odoo]
ignore=
    # TD-006: negative-path constraint tests trigger SQL IntegrityError
    # at the Postgres logger before assertRaises catches the exception.
    # Sources: tests asserting unique constraints
    # `l10n_py_point_of_emission_estab_point_uniq` and
    # `l10n_py_timbrado_name_uniq`. Fix: wrap the test methods in
    # tools.mute_logger('odoo.sql_db').
    ERROR.*odoo\.sql_db.*duplicate key value violates unique constraint
    # TD-007: _post_init_hook in addons/l10n_py_account/hooks.py:39-40
    # calls `_("...")` outside request context, producing WARNING lines
    # with multi-line tracebacks that checklog-odoo interprets as
    # noise. Fix: refactor hook to skip translation when no request
    # context, or use lazy_gettext.
    WARNING.*_post_init_hook
    WARNING.*translation.*context
