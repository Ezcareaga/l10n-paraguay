# checklog-odoo config — ignore known-noise log patterns in CI.
# Consumed by `checklog-odoo` (invoked from oca_checklog_odoo step in
# .github/workflows/test.yml when OCA_ENABLE_CHECKLOG_ODOO=1).
#
# Currently no ignores needed: TD-006 + TD-007 closed 2026-05-28.
# Keep this file as a forward-compatible scaffold for future noise — each
# pattern added must reference a BUGS_BACKLOG TD entry explaining the source.

[checklog-odoo]
ignore=
