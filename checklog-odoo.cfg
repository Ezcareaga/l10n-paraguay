# checklog-odoo config — ignore known-noise log patterns in CI.
# Consumed by `checklog-odoo` (invoked from oca_checklog_odoo step in
# .github/workflows/test.yml when OCA_ENABLE_CHECKLOG_ODOO=1).
#
# Each pattern below is a Python regex matched against Odoo log lines.
# Only ADD a pattern when there is a documented BUGS_BACKLOG TD entry
# explaining what produces it and how it will eventually be eliminated.

[checklog-odoo]
ignore=
    # TD-006: negative-path constraint tests trigger 2 separate log lines per
    # test from psycopg2 inside Odoo's SQL logger. Both must be ignored.
    # Line 1 (Odoo logger): `... ERROR odoo odoo.sql_db: bad query: b'INSERT ...'`
    # Line 2 (raw psycopg2): `ERROR: duplicate key value violates unique constraint "..."`
    # Sources: assertRaises tests for unique constraints
    # `l10n_py_point_of_emission_estab_point_uniq` and
    # `l10n_py_timbrado_name_uniq`. Fix: wrap test methods in
    # tools.mute_logger('odoo.sql_db').
    ERROR odoo odoo\.sql_db: bad query
    ERROR: duplicate key value violates unique constraint
    # TD-007: defensive `_post_init_hook` in addons/l10n_py_account/hooks.py
    # emits informative WARNINGs (chart migration state, journals without PoE)
    # plus `_("...")` calls outside request context produce traceback noise.
    # Three patterns cover the three subcases:
    WARNING.*odoo\.addons\.l10n_py_account\.hooks
    WARNING.*odoo\.tools\.translate.*no translation language detected
    WARNING.*_post_init_hook
